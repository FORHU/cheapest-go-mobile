name: Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --passWithNoTests

  build-android:
    name: Build Android (Staging)
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    env:
      MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
      RNMAPBOX_MAPS_DOWNLOAD_TOKEN: ${{ secrets.RNMAPBOX_MAPS_DOWNLOAD_TOKEN }}
      EXPO_PUBLIC_DUFFEL_API_KEY: ${{ secrets.EXPO_PUBLIC_DUFFEL_API_KEY }}
      EXPO_PUBLIC_FOURSQUARE_SERVICE_API_KEY: ${{ secrets.EXPO_PUBLIC_FOURSQUARE_SERVICE_API_KEY }}
      EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
      EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN }}
      EXPO_PUBLIC_MOBILE_API_KEY: ${{ secrets.EXPO_PUBLIC_MOBILE_API_KEY }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_SITE_URL: ${{ secrets.EXPO_PUBLIC_SITE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_WEB_API_URL: ${{ secrets.EXPO_PUBLIC_WEB_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Sync secrets to EAS preview environment
        run: |
          set -e
          printenv | grep -E "^(MAPBOX_DOWNLOADS_TOKEN|RNMAPBOX_MAPS_DOWNLOAD_TOKEN|EXPO_PUBLIC_)" | sort > .env
          echo "Syncing $(wc -l < .env) variables to EAS preview..."
          eas env:push --environment preview --force
          echo "Done syncing secrets."
          rm -f .env

      - name: Build APK (staging)
        run: eas build --platform android --profile staging --non-interactive
